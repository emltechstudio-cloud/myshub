<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reset Password - MY.SHUB</title>
<link rel="stylesheet" href="app.css">
<style>
.app-header .header-menu-btn { display: none !important; }
.app-nav { display: none !important; }
.app-content { margin-bottom: 0 !important; }
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-brand">
      <div class="brand-icon">M</div>
      <span>MY.SHUB</span>
    </div>
  </header>

  <main class="app-content">
    <div class="screen auth-screen">
      <div class="auth-logo">M</div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Answer your security question</p>

      <div class="auth-card">
        <form class="auth-form" id="recoverForm" onsubmit="handleRecovery(event)">
          <div id="recoverStep1">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="recoverEmail" placeholder="you@example.com" required>
            </div>
            <button type="button" class="btn btn-primary" onclick="fetchQuestions()" id="findBtn">
              <span class="spinner"></span>
              <span class="btn-text">Find Account</span>
            </button>
          </div>

          <div id="recoverStep2" style="display:none;">
            <div id="questionsContainer"></div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" class="form-input" id="recoverNewPassword" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="form-error" id="recoverError"></div>
            <button type="submit" class="btn btn-primary" id="resetBtn">
              <span class="spinner"></span>
              <span class="btn-text">Reset Password</span>
            </button>
          </div>
        </form>

        <div class="auth-footer">
          <p>Remember your password? <a href="login.html">Log in</a></p>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
</div>

<script>
const API_BASE = 'https://emltechstudio-myshub-api.hf.space';
var recoveryQuestions = [];
var recoveryEmail = '';

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

async function fetchQuestions() {
  var email = document.getElementById('recoverEmail').value.trim();
  var btn = document.getElementById('findBtn');

  if (!email) {
    showToast('Enter your email', 'error');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    var response = await fetch(API_BASE + '/auth/security-questions?email=' + encodeURIComponent(email));
    if (!response.ok) throw new Error('Account not found');
    var data = await response.json();

    recoveryEmail = email;
    recoveryQuestions = data.questions || [];

    var container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    recoveryQuestions.forEach(function(q, i) {
      var div = document.createElement('div');
      div.className = 'form-group';
      div.innerHTML = '<label class="form-label">' + q + '</label><input type="text" class="form-input" id="secAnswer' + i + '" placeholder="Your answer">';
      container.appendChild(div);
    });

    document.getElementById('recoverStep1').style.display = 'none';
    document.getElementById('recoverStep2').style.display = 'block';

  } catch (err) {
    showToast(err.message || 'Account not found', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

async function handleRecovery(e) {
  e.preventDefault();

  var newPwd = document.getElementById('recoverNewPassword').value;
  var btn = document.getElementById('resetBtn');
  var errorEl = document.getElementById('recoverError');

  if (!newPwd || newPwd.length < 6) {
    errorEl.textContent = 'Password must be at least 6 characters';
    errorEl.classList.add('show');
    return;
  }

  errorEl.textContent = '';
  errorEl.classList.remove('show');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    for (var i = 0; i < recoveryQuestions.length; i++) {
      var answer = document.getElementById('secAnswer' + i).value.trim();
      if (!answer) continue;

      var verifyResp = await fetch(API_BASE + '/auth/verify-security-answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: recoveryEmail, question: recoveryQuestions[i], answer: answer })
      });

      if (verifyResp.ok) {
        var resetResp = await fetch(API_BASE + '/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: recoveryEmail, question: recoveryQuestions[i], answer: answer, new_password: newPwd })
        });

        if (resetResp.ok) {
          showToast('Password reset! Sign in now.', 'success');
          setTimeout(function() {
            window.location.href = 'login.html';
          }, 1000);
          return;
        }
      }
    }
    throw new Error('Answers incorrect. Try again.');

  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.add('show');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
