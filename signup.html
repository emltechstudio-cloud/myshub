<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign Up - MY.SHUB</title>
<link rel="stylesheet" href="app.css">
<style>
.app-header .header-menu-btn { display: none !important; }
.app-nav { display: none !important; }
.app-content { margin-bottom: 0 !important; }
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-brand">
      <div class="brand-icon">M</div>
      <span>MY.SHUB</span>
    </div>
  </header>

  <main class="app-content">
    <div class="screen auth-screen">
      <div class="auth-logo">M</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Start your shop journey today</p>

      <div class="auth-card">
        <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
          <div id="step1">
            <div class="form-group">
              <label class="form-label">Shop Name</label>
              <input type="text" class="form-input" id="shopName" placeholder="My Awesome Shop" required>
            </div>

            <div class="form-group">
              <label class="form-label">Shop Slug</label>
              <input type="text" class="form-input" id="shopSlug" placeholder="my-awesome-shop" required oninput="checkSlug(this.value)">
              <div class="slug-check" id="slugCheck">
                <span class="slug-status loading" id="slugLoading">Checking...</span>
                <span class="slug-status available" id="slugAvailable">Available</span>
                <span class="slug-status taken" id="slugTaken">Already taken</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" class="form-input" id="password" placeholder="Min 6 characters" required minlength="6">
            </div>

            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat password" required>
            </div>

            <button type="button" class="btn btn-primary" onclick="goToStep2()">Continue</button>
          </div>

          <div id="step2" style="display:none;">
            <div class="form-group">
              <label class="form-label">Security Question</label>
              <select class="form-select" id="securityQuestion" required>
                <option value="">Select a question</option>
                <option value="What was your first pet's name?">What was your first pet's name?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                <option value="What was your childhood nickname?">What was your childhood nickname?</option>
                <option value="What school did you attend for sixth grade?">What school did you attend for sixth grade?</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Your Answer</label>
              <input type="text" class="form-input" id="securityAnswer" placeholder="Your answer" required>
            </div>

            <div class="form-group">
              <label class="form-label">Shop Category</label>
              <select class="form-select" id="shopCategory">
                <option value="">Select category (optional)</option>
                <option value="fashion">Fashion & Clothing</option>
                <option value="electronics">Electronics</option>
                <option value="food">Food & Drinks</option>
                <option value="beauty">Beauty & Health</option>
                <option value="home">Home & Garden</option>
                <option value="sports">Sports & Fitness</option>
                <option value="books">Books & Stationery</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-error" id="formError"></div>

            <div class="flex gap-2">
              <button type="button" class="btn btn-outline" onclick="goToStep1()">Back</button>
              <button type="submit" class="btn btn-success" id="signupBtn">
                <span class="spinner"></span>
                <span class="btn-text">Create Account</span>
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Log in</a></p>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
</div>

<script>
const API_BASE = 'https://emltechstudio-myshub-api.hf.space';
var slugTimeout = null;
var slugAvailable = false;

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

function goToStep2() {
  var shopName = document.getElementById('shopName').value.trim();
  var slug = document.getElementById('shopSlug').value.trim();
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var confirm = document.getElementById('confirmPassword').value;

  if (!shopName || !slug || !email || !password) {
    showToast('Please fill in all fields', 'error');
    return;
  }
  if (password !== confirm) {
    showToast('Passwords do not match', 'error');
    return;
  }
  if (password.length < 6) {
    showToast('Password must be at least 6 characters', 'error');
    return;
  }
  if (!slugAvailable) {
    showToast('Please choose an available slug', 'error');
    return;
  }

  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}

function goToStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
}

async function checkSlug(slug) {
  var loading = document.getElementById('slugLoading');
  var available = document.getElementById('slugAvailable');
  var taken = document.getElementById('slugTaken');

  slug = slug.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  document.getElementById('shopSlug').value = slug;

  if (slug.length < 3) {
    loading.classList.remove('show');
    available.classList.remove('show');
    taken.classList.remove('show');
    slugAvailable = false;
    return;
  }

  clearTimeout(slugTimeout);
  loading.classList.add('show');
  available.classList.remove('show');
  taken.classList.remove('show');

  slugTimeout = setTimeout(async function() {
    try {
      var response = await fetch(API_BASE + '/auth/check-slug?slug=' + encodeURIComponent(slug));
      var data = await response.json();
      loading.classList.remove('show');
      if (data.available) {
        available.classList.add('show');
        slugAvailable = true;
      } else {
        taken.classList.add('show');
        var msg = 'Already taken';
        if (data.suggestions && data.suggestions.length > 0) {
          msg = 'Taken. Try: ' + data.suggestions.slice(0, 3).join(', ');
        }
        taken.textContent = msg;
        slugAvailable = false;
      }
    } catch (err) {
      loading.classList.remove('show');
      slugAvailable = false;
    }
  }, 500);
}

async function handleSignup(e) {
  e.preventDefault();

  var btn = document.getElementById('signupBtn');
  var errorEl = document.getElementById('formError');

  var payload = {
    shop_name: document.getElementById('shopName').value.trim(),
    slug: document.getElementById('shopSlug').value.trim(),
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    security_question: document.getElementById('securityQuestion').value,
    security_answer: document.getElementById('securityAnswer').value.trim(),
    category: document.getElementById('shopCategory').value || 'other'
  };

  errorEl.textContent = '';
  errorEl.classList.remove('show');

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    var response = await fetch(API_BASE + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    var data = await response.json();

    if (response.ok) {
      var userData = {
        email: payload.email,
        password: payload.password,
        shop_name: payload.shop_name,
        slug: payload.slug
      };
      localStorage.setItem('myshub_user', JSON.stringify(userData));
      showToast('Account created successfully!', 'success');
      setTimeout(function() {
        window.location.href = 'dashboard.html';
      }, 500);
    } else {
      errorEl.textContent = (data.detail || data.message || 'Registration failed');
      errorEl.classList.add('show');
    }
  } catch (err) {
    errorEl.textContent = 'Network error. Please try again.';
    errorEl.classList.add('show');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

var user = localStorage.getItem('myshub_user');
if (user) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
