<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard - MY.SHUB</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="screen" id="dashboardScreen">
  <div class="section" style="padding-top:8px;">
    <!-- Shop Header Card -->
    <div class="card" style="background:linear-gradient(135deg,#1877f2 0%,#166fe5 100%);color:white;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;">M</div>
        <div>
          <div style="font-size:16px;font-weight:700;" id="dashShopName">Loading...</div>
          <div style="font-size:13px;opacity:0.85;" id="dashShopUrl">myshub.com/...</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <a href="preview.html" class="btn" style="flex:1;background:rgba(255,255,255,0.2);color:white;font-size:13px;padding:8px;border-radius:8px;text-align:center;">Preview</a>
        <a href="edit.html" class="btn" style="flex:1;background:rgba(255,255,255,0.2);color:white;font-size:13px;padding:8px;border-radius:8px;text-align:center;">Edit Shop</a>
      </div>
    </div>

    <!-- Stats Row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
      <div class="card" style="text-align:center;">
        <div style="font-size:24px;font-weight:700;color:#1877f2;" id="totalVisits">-</div>
        <div style="font-size:12px;color:#65676b;">Total Visits</div>
      </div>
      <div class="card" style="text-align:center;">
        <div style="font-size:24px;font-weight:700;color:#42b72a;" id="todayVisits">-</div>
        <div style="font-size:12px;color:#65676b;">Today</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <div class="card-title">Quick Actions</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:12px;">
        <a href="analytics.html" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;background:#f0f2f5;border-radius:10px;text-align:center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          <span style="font-size:12px;font-weight:600;color:#1c1e21;">Analytics</span>
        </a>
        <a href="refs.html" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;background:#f0f2f5;border-radius:10px;text-align:center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          <span style="font-size:12px;font-weight:600;color:#1c1e21;">Referrals</span>
        </a>
        <a href="payment.html" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;background:#f0f2f5;border-radius:10px;text-align:center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
          <span style="font-size:12px;font-weight:600;color:#1c1e21;">Upgrade</span>
        </a>
      </div>
    </div>

    <!-- Shop Status -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="card-title">Shop Status</div>
          <div class="card-subtitle" id="shopStatusText">Checking...</div>
        </div>
        <div style="width:12px;height:12px;border-radius:50%;background:#42b72a;" id="statusDot"></div>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="card">
      <div class="card-title">Recent Activity</div>
      <div id="activityList" style="margin-top:12px;">
        <div class="empty-state" style="padding:24px 0;">
          <div class="empty-state-desc">No recent activity</div>
        </div>
      </div>
    </div>

    <!-- Settings Link -->
    <a href="settings.html" class="list-item" style="border-radius:12px;margin-bottom:12px;">
      <div class="list-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.68 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </div>
      <div class="list-item-content">
        <div class="list-item-title">Settings</div>
        <div class="list-item-desc">Account, security, preferences</div>
      </div>
      <div class="list-item-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8a8d91" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </div>
    </a>

    <!-- Support Link -->
    <a href="support.html" class="list-item" style="border-radius:12px;margin-bottom:12px;">
      <div class="list-item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </div>
      <div class="list-item-content">
        <div class="list-item-title">Help & Support</div>
        <div class="list-item-desc">Get help, contact us</div>
      </div>
      <div class="list-item-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8a8d91" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </div>
    </a>

    <!-- Logout -->
    <button class="btn btn-outline" style="margin-bottom:24px;" onclick="doLogout()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      Log Out
    </button>
  </div>
</div>

<script>
const API_BASE = 'https://emltechstudio-myshub-api.hf.space';

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

function getUser() {
  var data = localStorage.getItem('myshub_user');
  return data ? JSON.parse(data) : null;
}

function doLogout() {
  localStorage.removeItem('myshub_user');
  window.location.href = 'login.html';
}

async function loadDashboard() {
  var user = getUser();
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  // Set shop name and URL
  if (user.shop_name) {
    document.getElementById('dashShopName').textContent = user.shop_name;
  }
  if (user.slug) {
    document.getElementById('dashShopUrl').textContent = 'myshub.com/' + user.slug;
  }

  try {
    // Get shop status
    if (user.slug) {
      var statusRes = await fetch(API_BASE + '/shop/status/' + encodeURIComponent(user.slug));
      var statusData = await statusRes.json().catch(function() { return {}; });
      var statusText = document.getElementById('shopStatusText');
      var statusDot = document.getElementById('statusDot');
      if (statusData.active) {
        statusText.textContent = 'Your shop is live';
        statusDot.style.background = '#42b72a';
      } else {
        statusText.textContent = 'Your shop is inactive';
        statusDot.style.background = '#ff4444';
      }
    }

    // Get preview/analytics data
    if (user.slug) {
      var previewRes = await fetch(API_BASE + '/shop/preview/' + encodeURIComponent(user.slug) + '?email=' + encodeURIComponent(user.email) + '&password=' + encodeURIComponent(user.password));
      var previewData = await previewRes.json().catch(function() { return {}; });
      if (previewData.visits !== undefined) {
        document.getElementById('totalVisits').textContent = previewData.visits;
      }
      if (previewData.shop_name && !user.shop_name) {
        document.getElementById('dashShopName').textContent = previewData.shop_name;
      }
    }

    // Get referrals count
    var refRes = await fetch(API_BASE + '/shop/referrals', {
      headers: { 'Email': user.email, 'Password': user.password }
    });
    var refData = await refRes.json().catch(function() { return {}; });
    if (refData.referrals) {
      var list = document.getElementById('activityList');
      list.innerHTML = '';
      refData.referrals.slice(0, 5).forEach(function(ref) {
        var item = document.createElement('div');
        item.className = 'list-item';
        item.style.borderRadius = '8px';
        item.style.marginBottom = '8px';
        item.innerHTML = '<div class="list-item-content"><div class="list-item-title">' + (ref.referred_email || 'New referral') + '</div><div class="list-item-desc">' + (ref.date || 'Recently') + '</div></div>';
        list.appendChild(item);
      });
    }

  } catch (err) {
    console.log('Dashboard load error:', err);
  }
}

// Check auth and load
var user = getUser();
if (!user) {
  window.location.href = 'login.html';
} else {
  loadDashboard();
}
</script>
</body>
</html>
