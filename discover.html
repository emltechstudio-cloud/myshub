<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Discover - MY.SHUB</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="screen" id="discoverScreen">
  <div class="section" style="padding-top:8px;">
    <!-- Search Bar -->
    <div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8a8d91" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" class="form-input" id="searchInput" placeholder="Search shops..." style="border:none;background:transparent;padding:0;flex:1;" oninput="searchShops(this.value)">
    </div>

    <!-- Categories -->
    <div style="display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:12px;scrollbar-width:none;">
      <button class="btn btn-primary" style="padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;" onclick="filterCategory('all')">All</button>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;" onclick="filterCategory('fashion')">Fashion</button>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;" onclick="filterCategory('electronics')">Electronics</button>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;" onclick="filterCategory('food')">Food</button>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;" onclick="filterCategory('beauty')">Beauty</button>
      <button class="btn btn-outline" style="padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;" onclick="filterCategory('home')">Home</button>
    </div>

    <!-- Shops Grid -->
    <div id="shopsGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <!-- Loading skeletons -->
      <div class="card" style="padding:16px;text-align:center;">
        <div class="skeleton skeleton-avatar" style="margin:0 auto 12px;"></div>
        <div class="skeleton skeleton-title" style="margin:0 auto 8px;"></div>
        <div class="skeleton skeleton-text" style="width:60%;margin:0 auto;"></div>
      </div>
      <div class="card" style="padding:16px;text-align:center;">
        <div class="skeleton skeleton-avatar" style="margin:0 auto 12px;"></div>
        <div class="skeleton skeleton-title" style="margin:0 auto 8px;"></div>
        <div class="skeleton skeleton-text" style="width:60%;margin:0 auto;"></div>
      </div>
    </div>

    <!-- Empty State (hidden by default) -->
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-state-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8a8d91" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <div class="empty-state-title">No shops found</div>
      <div class="empty-state-desc">Try a different search or category</div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://emltechstudio-myshub-api.hf.space';
var allShops = [];

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

async function loadShops() {
  try {
    // Try to fetch from a public endpoint - if not available, show sample data
    var response = await fetch(API_BASE + '/shop/live/all').catch(function() { return {ok:false}; });
    if (!response.ok) {
      // Fallback: try admin/shops or show demo data
      response = await fetch(API_BASE + '/admin/shops?page=1&limit=50');
    }
    var data = await response.json().catch(function() { return {shops:[]}; });
    allShops = data.shops || data || [];
    renderShops(allShops);
  } catch (err) {
    // Show demo data if API fails
    allShops = [
      { shop_name: 'Fashion Hub', slug: 'fashion-hub', category: 'fashion', visits: 1240 },
      { shop_name: 'Tech World', slug: 'tech-world', category: 'electronics', visits: 890 },
      { shop_name: 'Sweet Treats', slug: 'sweet-treats', category: 'food', visits: 650 },
      { shop_name: 'Glow Beauty', slug: 'glow-beauty', category: 'beauty', visits: 430 },
      { shop_name: 'Home Comfort', slug: 'home-comfort', category: 'home', visits: 320 },
      { shop_name: 'Fit Life', slug: 'fit-life', category: 'sports', visits: 210 }
    ];
    renderShops(allShops);
  }
}

function renderShops(shops) {
  var grid = document.getElementById('shopsGrid');
  var empty = document.getElementById('emptyState');

  if (!shops || shops.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  grid.innerHTML = '';

  shops.forEach(function(shop) {
    var card = document.createElement('a');
    card.className = 'card';
    card.style.cssText = 'padding:16px;text-align:center;text-decoration:none;display:block;transition:transform 0.2s;';
    card.style.animation = 'scaleIn 0.3s ease forwards';
    card.href = 'https://emltechstudio-myshub-api.hf.space/shop/live/' + shop.slug;
    card.target = '_blank';

    var initial = (shop.shop_name || 'S').charAt(0).toUpperCase();
    var categoryLabel = shop.category ? shop.category.charAt(0).toUpperCase() + shop.category.slice(1) : 'Shop';
    var visits = shop.visits || 0;

    card.innerHTML = 
      '<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1877f2,#166fe5);color:white;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 12px;">' + initial + '</div>' +
      '<div style="font-size:15px;font-weight:700;color:#1c1e21;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (shop.shop_name || 'Unnamed Shop') + '</div>' +
      '<div style="font-size:12px;color:#65676b;margin-bottom:8px;">' + categoryLabel + '</div>' +
      '<div style="font-size:12px;color:#8a8d91;">' + visits + ' visits</div>';

    grid.appendChild(card);
  });
}

function searchShops(query) {
  query = query.toLowerCase().trim();
  if (!query) {
    renderShops(allShops);
    return;
  }
  var filtered = allShops.filter(function(s) {
    return (s.shop_name && s.shop_name.toLowerCase().includes(query)) ||
           (s.slug && s.slug.toLowerCase().includes(query)) ||
           (s.category && s.category.toLowerCase().includes(query));
  });
  renderShops(filtered);
}

function filterCategory(cat) {
  // Update button styles
  var buttons = document.querySelectorAll('.section button');
  buttons.forEach(function(btn) {
    if (btn.textContent.toLowerCase() === cat || (cat === 'all' && btn.textContent === 'All')) {
      btn.className = 'btn btn-primary';
      btn.style.cssText = 'padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;';
    } else {
      btn.className = 'btn btn-outline';
      btn.style.cssText = 'padding:6px 14px;font-size:13px;border-radius:20px;white-space:nowrap;';
    }
  });

  if (cat === 'all') {
    renderShops(allShops);
  } else {
    var filtered = allShops.filter(function(s) {
      return s.category === cat;
    });
    renderShops(filtered);
  }
}

// Load on init
loadShops();
</script>
</body>
</html>
