<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Referrals - MY.SHUB</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="screen" id="refsScreen">
  <div class="section" style="padding-top:8px;">
    <div class="section-title">Referrals</div>

    <!-- Referral Stats -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
      <div class="card" style="text-align:center;">
        <div style="font-size:28px;font-weight:700;color:#1877f2;" id="refCount">0</div>
        <div style="font-size:12px;color:#65676b;">Total Referrals</div>
      </div>
      <div class="card" style="text-align:center;">
        <div style="font-size:28px;font-weight:700;color:#42b72a;" id="refEarnings">$0</div>
        <div style="font-size:12px;color:#65676b;">Earnings</div>
      </div>
    </div>

    <!-- Referral Link -->
    <div class="card">
      <div class="card-title">Your Referral Link</div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <input type="text" class="form-input" id="refLink" readonly style="flex:1;background:#f0f2f5;font-size:13px;">
        <button class="btn btn-primary" style="width:auto;padding:12px 16px;" onclick="copyRefLink()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
    </div>

    <!-- Referral List -->
    <div class="card">
      <div class="card-title">Referred Users</div>
      <div id="referralsList" style="margin-top:12px;">
        <div class="empty-state" style="padding:16px 0;">
          <div class="empty-state-desc">No referrals yet. Share your link to get started.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://emltechstudio-myshub-api.hf.space';

function getUser() {
  var data = localStorage.getItem('myshub_user');
  return data ? JSON.parse(data) : null;
}

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

async function loadReferrals() {
  var user = getUser();
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  // Set referral link
  var refUrl = 'https://emltechstudio-myshub-api.hf.space?ref=' + (user.email || user.slug);
  document.getElementById('refLink').value = refUrl;

  try {
    var response = await fetch(API_BASE + '/shop/referrals', {
      headers: { 
        'Email': user.email,
        'Password': user.password
      }
    });
    var data = await response.json().catch(function() { return {referrals:[]}; });

    var refs = data.referrals || [];
    document.getElementById('refCount').textContent = refs.length;

    var list = document.getElementById('referralsList');
    if (refs.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:16px 0;"><div class="empty-state-desc">No referrals yet. Share your link to get started.</div></div>';
    } else {
      list.innerHTML = '';
      refs.forEach(function(ref) {
        var item = document.createElement('div');
        item.className = 'list-item';
        item.style.borderRadius = '8px';
        item.style.marginBottom = '8px';
        item.innerHTML = '<div class="list-item-icon" style="background:#e7f3ff;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div><div class="list-item-content"><div class="list-item-title">' + (ref.referred_email || 'User') + '</div><div class="list-item-desc">' + (ref.date || 'Recently') + '</div></div>';
        list.appendChild(item);
      });
    }

  } catch (err) {
    console.log('Referrals load error:', err);
  }
}

function copyRefLink() {
  var input = document.getElementById('refLink');
  input.select();
  input.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(input.value).then(function() {
    showToast('Link copied!', 'success');
  }).catch(function() {
    document.execCommand('copy');
    showToast('Link copied!', 'success');
  });
}

loadReferrals();
</script>
</body>
</html>
