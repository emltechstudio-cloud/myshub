<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <title>MyShub Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Root ─── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text2: #475569;
            --text3: #94a3b8;
            --border: #e2e8f0;
            --brand: #2563eb;
            --brand-light: #3b82f6;
            --brand-dark: #1e40af;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text: #f1f5f9;
                --text2: #94a3b8;
                --text3: #64748b;
                --border: #334155;
            }
        }
        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        body { overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; }

        /* ─── Sections ─── */
        .section { display: none; flex-direction: column; height: 100vh; overflow: hidden; animation: fadeIn 0.3s ease; }
        .section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ─── Auth Layout ─── */
        .auth-section { align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
        .auth-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 32px 24px;
            max-width: 420px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .auth-card h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
        .auth-card p.sub { color: var(--text2); font-size: 0.9rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; color: var(--text2); }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--brand-light);
        }
        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 40px; }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 1rem;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--brand); color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
        .btn-primary:hover { background: var(--brand-dark); transform: translateY(-1px); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: var(--text3); color: white; }
        .btn-sm { padding: 10px 16px; font-size: 0.85rem; width: auto; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg { color: #dc2626; font-size: 0.85rem; padding: 10px; background: #fef2f2; border-radius: 8px; margin-bottom: 12px; display: none; }
        .auth-switch { text-align: center; margin-top: 16px; font-size: 0.85rem; }
        .auth-switch a { color: var(--brand); cursor: pointer; text-decoration: none; font-weight: 600; margin: 0 4px; }

        /* ─── App Layout ─── */
        .app-section { display: flex !important; }
        .app-header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .app-header .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1rem; color: var(--brand); text-decoration: none; }
        .app-header .actions { display: flex; gap: 8px; }
        .app-header button { background: none; border: none; font-size: 1.1rem; color: var(--text2); cursor: pointer; padding: 6px; }
        .app-header button:hover { background: var(--border); border-radius: 8px; }

        .app-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 240px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 16px 12px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text2);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sidebar-nav a i { width: 20px; text-align: center; }
        .sidebar-nav a:hover { background: var(--bg); color: var(--brand); }
        .sidebar-nav a.active { background: var(--brand); color: white; }

        .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }

        /* ─── Cards ─── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
        .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; color: var(--brand-dark); }
        .card-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .card-row:last-child { border-bottom: none; }
        .card-row .label { color: var(--text2); font-size: 0.85rem; }
        .card-row .value { font-weight: 600; font-size: 0.9rem; }
        .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge-pro { background: #dbeafe; color: #1e40af; }
        .badge-premium { background: #fef3c7; color: #92400e; }
        .badge-free { background: #f3f4f6; color: #4b5563; }

        /* ─── Analytics ─── */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
        .stat-card {
            background: linear-gradient(135deg, var(--brand-dark), var(--brand));
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .number { font-size: 1.6rem; font-weight: 900; }
        .stat-card .label { font-size: 0.8rem; opacity: 0.9; margin-top: 4px; }
        .analytics-bar { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .analytics-bar .label { width: 80px; font-size: 0.85rem; color: var(--text2); }
        .analytics-bar .track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .analytics-bar .fill { height: 100%; background: var(--brand); border-radius: 4px; }
        .analytics-bar .value { font-size: 0.8rem; color: var(--text3); min-width: 30px; text-align: right; }

        /* ─── Custom Links ─── */
        .custom-link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }
        .custom-link-item .icon-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 1.1rem; cursor: pointer; min-width: 36px; text-align: center; }
        .custom-link-item input { flex: 1; border: none; background: transparent; padding: 6px 0; font-size: 0.85rem; }
        .custom-link-item input:focus { outline: none; }
        .custom-link-item .remove { color: var(--text3); cursor: pointer; padding: 4px; }
        .custom-link-item .remove:hover { color: var(--danger); }

        /* ─── Icon Picker ─── */
        .icon-picker {
            position: fixed;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            max-width: 300px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            box-shadow: var(--shadow);
        }
        .icon-picker.open { display: grid; }
        .icon-option {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            background: var(--bg);
            border: 1px solid var(--border);
            transition: all 0.2s;
            font-size: 1.2rem;
        }
        .icon-option:hover { border-color: var(--brand); background: #eff6ff; }

        /* ─── Toast ─── */
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; }
        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: var(--shadow);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideUp 0.3s ease;
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ─── Utilities ─── */
        .text-muted { color: var(--text3); font-size: 0.85rem; }
        .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin: 16px 0 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 8px; }
        .mt-2 { margin-top: 12px; }
        .mb-1 { margin-bottom: 8px; }
        .hidden { display: none !important; }

        /* ─── Mobile ─── */
        @media (max-width: 768px) {
            .sidebar { width: 100%; max-width: 240px; position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); transition: transform 0.3s; z-index: 10; }
            .sidebar.open { transform: translateX(0); }
            .content { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- LOGIN -->
    <div class="section auth-section" id="section-login">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="sub">Sign in to manage your shop</p>
            <div class="error-msg" id="loginError"></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrap">
                    <input type="password" id="loginPassword" placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)"><i class="fa-solid fa-eye"></i></button>
                </div>
            </div>
            <button class="btn btn-primary" id="loginBtn" onclick="login()"><i class="fa-solid fa-arrow-right"></i> Sign In</button>
            <div class="auth-switch">
                <a onclick="showSection('signup')">Create shop</a>
                <a onclick="showSection('recover')">Forgot password?</a>
            </div>
        </div>
    </div>

    <!-- SIGNUP -->
    <div class="section auth-section" id="section-signup">
        <div class="auth-card">
            <h1>Create Your Shop</h1>
            <p class="sub">Get started in minutes</p>
            <div class="error-msg" id="signupError"></div>
            <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"></div>
            <div class="form-group"><label>Business Name</label><input type="text" id="regName" placeholder="My Shop"></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="Your phone number"></div>
            <div class="form-group"><label>Country</label><select id="regCountry"><option value="">Select country</option><option value="Nigeria">Nigeria</option><option value="Ghana">Ghana</option><option value="Kenya">Kenya</option><option value="United States">United States</option><option value="United Kingdom">United Kingdom</option><option value="Canada">Canada</option></select></div>
            <div class="form-group"><label>Password</label><div class="password-wrap"><input type="password" id="regPassword" placeholder="Min 6 characters"><button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)"><i class="fa-solid fa-eye"></i></button></div></div>
            <div class="form-group"><label>Confirm Password</label><div class="password-wrap"><input type="password" id="regPasswordConfirm" placeholder="Type again"><button type="button" class="password-toggle" onclick="togglePassword('regPasswordConfirm', this)"><i class="fa-solid fa-eye"></i></button></div></div>
            <button class="btn btn-primary" id="regBtn" onclick="register()"><i class="fa-solid fa-plus"></i> Create Shop</button>
            <div class="auth-switch"><a onclick="showSection('login')">Already have a shop?</a></div>
        </div>
    </div>

    <!-- RECOVER PASSWORD -->
    <div class="section auth-section" id="section-recover">
        <div class="auth-card">
            <h1>Reset Password</h1>
            <p class="sub">Answer a security question</p>
            <div class="error-msg" id="recoverError"></div>
            <div id="recoverStep1">
                <div class="form-group"><label>Email</label><input type="email" id="recoverEmail" placeholder="you@example.com"></div>
                <button class="btn btn-primary" onclick="fetchRecoveryQuestions()">Find Account</button>
            </div>
            <div id="recoverStep2" class="hidden">
                <div id="securityQuestionsContainer"></div>
                <div class="form-group"><label>New Password</label><div class="password-wrap"><input type="password" id="recoverNewPassword" placeholder="Min 6 characters"><button type="button" class="password-toggle" onclick="togglePassword('recoverNewPassword', this)"><i class="fa-solid fa-eye"></i></button></div></div>
                <button class="btn btn-primary" onclick="submitRecovery()">Reset Password</button>
            </div>
            <div class="auth-switch"><a onclick="showSection('login')">Back to sign in</a></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="section app-section" id="section-app">
        <header class="app-header">
            <div style="display:flex;align-items:center;gap:8px;">
                <button id="sidebarToggle" style="display:none;" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <span class="brand"><i class="fa-solid fa-store"></i> MyShub</span>
            </div>
            <div class="actions">
                <button onclick="logout()" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>
        <div class="app-layout">
            <aside class="sidebar" id="appSidebar">
                <nav class="sidebar-nav" id="sidebarNav"></nav>
            </aside>
            <main class="content">
                <div id="tabOverview" class="tab-content active"></div>
                <div id="tabEdit" class="tab-content"></div>
                <div id="tabPreview" class="tab-content"></div>
                <div id="tabAnalytics" class="tab-content"></div>
                <div id="tabReferrals" class="tab-content"></div>
                <div id="tabSettings" class="tab-content"></div>
            </main>
        </div>
    </div>
</div>

<!-- Icon Picker -->
<div class="icon-picker" id="iconPicker"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
    // ═══════════════════════════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════════════════════════
    const API = 'https://emltechstudio-myshub-api.hf.space';
    const EMOJIS = ['📦','🛒','📞','🎯','⭐','💬','📧','🌐','📱','💻','📷','🎥','🎵','📚','✏️','🔗','📌','💡','🔥','✨'];
    const COUNTRIES = ['Nigeria', 'Ghana', 'Kenya', 'United States', 'United Kingdom', 'Canada', 'India', 'Australia', 'Germany', 'France', 'Brazil', 'Mexico', 'South Africa'];
    const PLATFORMS = [
        { name: 'Facebook', icon: 'fab fa-facebook-f' },
        { name: 'Instagram', icon: 'fab fa-instagram' },
        { name: 'TikTok', icon: 'fab fa-tiktok' },
        { name: 'X', icon: 'fab fa-x-twitter' },
        { name: 'YouTube', icon: 'fab fa-youtube' },
        { name: 'LinkedIn', icon: 'fab fa-linkedin-in' },
        { name: 'WhatsApp', icon: 'fab fa-whatsapp' },
        { name: 'Telegram', icon: 'fab fa-telegram' },
        { name: 'Discord', icon: 'fab fa-discord' }
    ];

    const PLAN_LIMITS = {
        free: { socials: 5, custom_links: 2, brand_colors: false, fonts: false, gradients: false },
        pro: { socials: 10, custom_links: 5, brand_colors: true, fonts: true, gradients: false },
        premium: { socials: 999, custom_links: 999, brand_colors: true, fonts: true, gradients: true }
    };

    // ─── STATE ───────────────────────────────────────────────────────
    let session = {
        email: '', password: '', slug: '', plan: 'free',
        shopData: null
    };
    let currentTab = 'tabOverview';
    let recoveryEmail = '', recoveryQuestions = [];
    let selectedIcon = null;
    let iconPickerTarget = null;

    // ─── UTILS ───────────────────────────────────────────────────────
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-solid fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fa-solid fa-eye';
        }
    }

    function showToast(msg, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
        toast.innerHTML = `<i class="fa-solid ${icons[type]}"></i><span>${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        const section = document.getElementById('section-' + sectionId);
        if (section) section.classList.add('active');

        if (sectionId === 'app' && session.email && session.password) {
            if (!session.shopData) loadShop();
            renderSidebar();
            switchTab('tabOverview');
        }
    }

    async function apiFetch(endpoint, method = 'GET', body = null) {
        const headers = {
            'email': session.email,
            'password': session.password,
            'Content-Type': 'application/json'
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);

        const resp = await fetch(API + endpoint, options);
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.detail || 'Request failed');
        }
        return resp.json();
    }

    // ─── AUTH ─────────────────────────────────────────────────────────
    window.login = async function() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errorEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');

        if (!email || !password) { errorEl.textContent = 'Please fill all fields';
            errorEl.style.display = 'block'; return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

        try {
            const data = await apiFetch('/auth/login', 'POST', { email, password });
            session.email = email;
            session.password = password;
            session.slug = data.slug || '';
            session.plan = data.plan || 'free';
            localStorage.setItem('myshop_session', JSON.stringify(session));
            showToast('Logged in!', 'success');
            showSection('app');
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Sign In';
        }
    };

    window.register = async function() {
        const email = document.getElementById('regEmail').value.trim();
        const name = document.getElementById('regName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const country = document.getElementById('regCountry').value;
        const password = document.getElementById('regPassword').value;
        const passwordConfirm = document.getElementById('regPasswordConfirm').value;
        const errorEl = document.getElementById('signupError');
        const btn = document.getElementById('regBtn');

        if (!email || !name || !phone || !country || !password) { errorEl.textContent = 'Fill all required fields';
            errorEl.style.display = 'block'; return; }
        if (password !== passwordConfirm) { errorEl.textContent = 'Passwords do not match';
            errorEl.style.display = 'block'; return; }
        if (password.length < 6) { errorEl.textContent = 'Password must be 6+ characters';
            errorEl.style.display = 'block'; return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

        try {
            const body = {
                email, password, business_name: name, phone, country,
                location: '', description: '', tagline: '',
                logo_url: '', catalog_url: '', whatsapp_catalog_url: '',
                socials: {}, referred_by: '',
                security_questions: [
                    { question: 'What city were you born in?', answer: '' },
                    { question: 'What is your mother\'s maiden name?', answer: '' },
                    { question: 'What was your first pet\'s name?', answer: '' }
                ]
            };
            const data = await apiFetch('/auth/register', 'POST', body);
            showToast('Shop created! Now sign in.', 'success');
            showSection('login');
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-plus"></i> Create Shop';
        }
    };

    window.fetchRecoveryQuestions = async function() {
        const email = document.getElementById('recoverEmail').value.trim();
        const errorEl = document.getElementById('recoverError');

        if (!email) { errorEl.textContent = 'Enter your email';
            errorEl.style.display = 'block'; return; }

        try {
            const resp = await fetch(`${API}/auth/security-questions?email=${encodeURIComponent(email)}`);
            if (!resp.ok) throw new Error('Account not found');
            const data = await resp.json();
            recoveryEmail = email;
            recoveryQuestions = data.questions || [];

            const container = document.getElementById('securityQuestionsContainer');
            container.innerHTML = recoveryQuestions.map((q, i) =>
                `<div class="form-group"><label>${q}</label><input type="text" id="secAnswer${i}" placeholder="Your answer"></div>`
            ).join('');

            document.getElementById('recoverStep1').classList.add('hidden');
            document.getElementById('recoverStep2').classList.remove('hidden');
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.style.display = 'block';
        }
    };

    window.submitRecovery = async function() {
        const newPwd = document.getElementById('recoverNewPassword').value.trim();
        const errorEl = document.getElementById('recoverError');

        if (!newPwd || newPwd.length < 6) { errorEl.textContent = 'Password must be 6+ characters';
            errorEl.style.display = 'block'; return; }

        try {
            for (let i = 0; i < recoveryQuestions.length; i++) {
                const answer = document.getElementById('secAnswer' + i).value.trim();
                if (!answer) continue;

                const verifyResp = await fetch(`${API}/auth/verify-security-answer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: recoveryEmail, question: recoveryQuestions[i], answer })
                });

                if (verifyResp.ok) {
                    const resetResp = await fetch(`${API}/auth/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: recoveryEmail, question: recoveryQuestions[i], answer, new_password: newPwd })
                    });
                    if (resetResp.ok) {
                        showToast('Password reset! Sign in now.', 'success');
                        showSection('login');
                        return;
                    }
                }
            }
            throw new Error('Answers incorrect. Try again.');
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.style.display = 'block';
        }
    };

    window.logout = function() {
        localStorage.removeItem('myshop_session');
        session = { email: '', password: '', slug: '', plan: 'free', shopData: null };
        showToast('Logged out', 'info');
        showSection('login');
    };

    // ─── SHOP DATA ─────────────────────────────────────────────────────
    async function loadShop() {
        try {
            const data = await apiFetch(`/shop/preview/${session.slug}`);
            session.shopData = data;
            session.plan = data.plan || 'free';
            localStorage.setItem('myshop_session', JSON.stringify(session));
            renderAllTabs();
        } catch (e) {
            showToast('Error loading shop: ' + e.message, 'error');
        }
    }

    function renderSidebar() {
        const nav = document.getElementById('sidebarNav');
        if (!nav) return;
        const items = [
            { id: 'tabOverview', icon: 'fa-house', label: 'Overview' },
            { id: 'tabEdit', icon: 'fa-pen', label: 'Edit' },
            { id: 'tabPreview', icon: 'fa-eye', label: 'Preview' },
            { id: 'tabAnalytics', icon: 'fa-chart-bar', label: 'Analytics' },
            { id: 'tabReferrals', icon: 'fa-gift', label: 'Referrals' },
            { id: 'tabSettings', icon: 'fa-gear', label: 'Settings' }
        ];
        nav.innerHTML = items.map(it => `<a class="${currentTab === it.id ? 'active' : ''}" onclick="switchTab('${it.id}')"><i class="fa-solid ${it.icon}"></i> ${it.label}</a>`).join('');
    }

    function switchTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.sidebar-nav a').forEach(el => {
            el.classList.toggle('active', el.textContent.includes(tabId.replace('tab', '')));
        });
    }

    function renderAllTabs() {
        renderOverview();
        renderEdit();
        renderAnalytics();
        renderReferrals();
        renderSettings();
    }

    // ─── OVERVIEW ─────────────────────────────────────────────────────
    function renderOverview() {
        const data = session.shopData || {};
        const json = data.shop_json || {};
        const visits = json.analytics?.visit_count || 0;
        const today = new Date().toISOString().slice(0, 10);
        const todayVisits = json.analytics?.daily_visits?.[today] || 0;
        const active = data.status === 'active';

        let html = `
            <h2>${json.business_name || 'Your Shop'}</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="number">${visits}</div><div class="label">Total Visits</div></div>
                <div class="stat-card"><div class="number">${todayVisits}</div><div class="label">Today</div></div>
                <div class="stat-card"><div class="number"><span class="badge badge-${session.plan}">${session.plan.toUpperCase()}</span></div><div class="label">Plan</div></div>
            </div>
            <div class="card">
                <div class="card-row"><span class="label">Your link</span><span class="value" onclick="copyLink('https://myshop.afric.site/${session.slug}')" style="cursor:pointer;color:var(--brand);">Copy →</span></div>
                <div class="card-row"><span class="label">Status</span><span class="value">${active ? '🟢 Live' : '⛔ Inactive'}</span></div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-primary btn-sm" onclick="switchTab('tabEdit')"><i class="fa-solid fa-pen"></i> Edit</button>
                <button class="btn btn-secondary btn-sm" onclick="switchTab('tabAnalytics')"><i class="fa-solid fa-chart-bar"></i> Analytics</button>
                <button class="btn btn-secondary btn-sm" onclick="switchTab('tabSettings')"><i class="fa-solid fa-gear"></i> Settings</button>
            </div>
        `;
        document.getElementById('tabOverview').innerHTML = html;
    }

    window.copyLink = function(url) {
        navigator.clipboard.writeText(url).then(() => showToast('Copied!', 'success'));
    };

    // ─── EDIT TAB ──────────────────────────────────────────────────────
    let editSocials = {};
    let editCustomLinks = [];

    function renderEdit() {
        const data = session.shopData || {};
        const json = data.shop_json || {};
        const plan = session.plan || 'free';
        const limits = PLAN_LIMITS[plan] || PLAN_LIMITS.free;
        const socials = json.socials || {};
        const customLinks = json.custom_links || [];
        const brand = json.brand_colors || {};
        const typo = json.typography || {};

        editSocials = { ...socials };
        editCustomLinks = [...customLinks];

        let socialChips = '';
        for (let [platform, url] of Object.entries(socials)) {
            const p = PLATFORMS.find(x => x.name.toLowerCase() === platform);
            if (p) socialChips += `<div class="card" style="padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span><i class="${p.icon}"></i> ${platform}</span><button onclick="removeSocial('${platform}')" style="background:none;border:none;color:var(--danger);cursor:pointer;">✕</button></div>`;
        }

        let customLinksHtml = '';
        customLinks.forEach((link, idx) => {
            customLinksHtml += `
                <div class="custom-link-item">
                    <button class="icon-btn" onclick="openIconPicker(this, ${idx})">${link.icon || '🔗'}</button>
                    <input type="text" placeholder="Label" value="${link.label || ''}" onchange="updateCustomLink(${idx}, 'label', this.value)">
                    <input type="url" placeholder="URL" value="${link.url || ''}" onchange="updateCustomLink(${idx}, 'url', this.value)">
                    <span class="remove" onclick="removeCustomLink(${idx})"><i class="fa-solid fa-xmark"></i></span>
                </div>
            `;
        });

        let html = `
            <h2>Edit Your Shop</h2>
            <div class="card">
                <h3>Business Info</h3>
                <div class="form-group"><label>Name</label><input type="text" id="editName" value="${json.business_name || ''}"></div>
                <div class="form-group"><label>Tagline</label><input type="text" id="editTagline" value="${json.tagline || ''}"></div>
                <div class="form-group"><label>Description</label><textarea id="editDesc" placeholder="Describe your business...">${json.description || ''}</textarea></div>
            </div>
            <div class="card">
                <h3>Contact</h3>
                <div class="form-group"><label>Phone</label><input type="tel" id="editPhone" value="${json.phone || ''}"></div>
                <div class="form-group"><label>Email</label><input type="email" id="editEmail" value="${json.email || ''}"></div>
                <div class="form-group"><label>Location</label><input type="text" id="editLocation" value="${json.location || ''}"></div>
                <div class="form-group"><label>Country</label><input type="text" id="editCountry" value="${json.country || ''}"></div>
                <div class="form-group"><label>State</label><input type="text" id="editState" value="${json.state || ''}"></div>
                <div class="form-group"><label>City</label><input type="text" id="editCity" value="${json.city || ''}"></div>
            </div>
            <div class="card">
                <h3>Catalog</h3>
                <div class="form-group"><label>Catalog URL</label><input type="url" id="editCatalog" value="${json.catalog_url || ''}" placeholder="https://selar.co/yourstore"></div>
            </div>
            <div class="card">
                <h3>Socials (${Object.keys(socials).length}/${limits.socials})</h3>
                ${socialChips}
                <button class="btn btn-secondary btn-sm" onclick="showPlatformSelector()" ${Object.keys(socials).length >= limits.socials ? 'disabled' : ''}>+ Add Platform</button>
            </div>
            <div class="card">
                <h3>Custom Links (${customLinks.length}/${limits.custom_links})</h3>
                ${customLinksHtml}
                <button class="btn btn-secondary btn-sm" onclick="addCustomLink()" ${customLinks.length >= limits.custom_links ? 'disabled' : ''}>+ Add Link</button>
            </div>
            ${limits.brand_colors ? `
            <div class="card">
                <h3>Brand Colors</h3>
                <div style="display:flex;gap:12px;">
                    <div class="form-group"><label>Primary</label><input type="color" id="editPrimary" value="${brand.primary || '#2563eb'}"></div>
                    <div class="form-group"><label>Secondary</label><input type="color" id="editSecondary" value="${brand.secondary || '#ffffff'}"></div>
                </div>
            </div>
            ` : ''}
            ${limits.fonts ? `
            <div class="card">
                <h3>Typography</h3>
                <div class="form-group"><label>Heading Font</label><select id="editHeading"><option value="Inter" ${typo.heading_font === 'Inter' ? 'selected' : ''}>Inter</option><option value="Poppins" ${typo.heading_font === 'Poppins' ? 'selected' : ''}>Poppins</option><option value="Playfair" ${typo.heading_font === 'Playfair' ? 'selected' : ''}>Playfair</option></select></div>
                <div class="form-group"><label>Body Font</label><select id="editBody"><option value="Inter" ${typo.body_font === 'Inter' ? 'selected' : ''}>Inter</option><option value="Open Sans" ${typo.body_font === 'Open Sans' ? 'selected' : ''}>Open Sans</option></select></div>
            </div>
            ` : ''}
            <button class="btn btn-primary" onclick="saveEdit()" style="width:100%;"><i class="fa-solid fa-save"></i> Save Changes</button>
        `;
        document.getElementById('tabEdit').innerHTML = html;
    }

    window.showPlatformSelector = function() {
        const platforms = PLATFORMS;
        let html = '<div class="card" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">';
        platforms.forEach(p => {
            html += `<button class="btn btn-secondary btn-sm" onclick="addPlatform('${p.name}')" style="justify-content:center;"><i class="${p.icon}"></i> ${p.name}</button>`;
        });
        html += '</div>';
        const card = document.querySelector('.card');
        card.insertAdjacentHTML('afterend', html);
    };

    window.addPlatform = function(platform) {
        const username = prompt(`Enter your ${platform} username:`);
        if (!username) return;
        editSocials[platform.toLowerCase()] = `https://example.com/${username}`;
        renderEdit();
    };

    window.removeSocial = function(platform) {
        delete editSocials[platform];
        renderEdit();
    };

    window.addCustomLink = function() {
        editCustomLinks.push({ label: '', url: '', icon: '🔗' });
        renderEdit();
    };

    window.updateCustomLink = function(idx, field, value) {
        if (editCustomLinks[idx]) editCustomLinks[idx][field] = value;
    };

    window.removeCustomLink = function(idx) {
        editCustomLinks.splice(idx, 1);
        renderEdit();
    };

    window.openIconPicker = function(btn, idx) {
        iconPickerTarget = { btn, idx };
        selectedIcon = editCustomLinks[idx]?.icon || '🔗';
        const picker = document.getElementById('iconPicker');
        picker.innerHTML = EMOJIS.map(emoji => `<div class="icon-option" onclick="selectIcon('${emoji}')">${emoji}</div>`).join('');
        const rect = btn.getBoundingClientRect();
        picker.style.left = rect.left + 'px';
        picker.style.top = (rect.bottom + 4) + 'px';
        picker.classList.add('open');
    };

    window.selectIcon = function(emoji) {
        if (iconPickerTarget) {
            editCustomLinks[iconPickerTarget.idx].icon = emoji;
            iconPickerTarget.btn.textContent = emoji;
            document.getElementById('iconPicker').classList.remove('open');
        }
    };

    window.saveEdit = async function() {
        const plan = session.plan || 'free';
        const limits = PLAN_LIMITS[plan];

        if (Object.keys(editSocials).length > limits.socials) {
            showToast(`Max ${limits.socials} socials for ${plan}`, 'error');
            return;
        }
        if (editCustomLinks.length > limits.custom_links) {
            showToast(`Max ${limits.custom_links} custom links for ${plan}`, 'error');
            return;
        }

        const payload = {
            email: session.email,
            password: session.password,
            business_name: document.getElementById('editName').value,
            tagline: document.getElementById('editTagline').value,
            description: document.getElementById('editDesc').value,
            phone: document.getElementById('editPhone').value,
            email: document.getElementById('editEmail').value,
            location: document.getElementById('editLocation').value,
            country: document.getElementById('editCountry').value,
            state: document.getElementById('editState').value,
            city: document.getElementById('editCity').value,
            catalog_url: document.getElementById('editCatalog').value,
            whatsapp_catalog_url: '',
            socials: editSocials,
            custom_links: editCustomLinks,
            brand_primary: document.getElementById('editPrimary')?.value || '#2563eb',
            brand_secondary: document.getElementById('editSecondary')?.value || '#ffffff',
            heading_font: document.getElementById('editHeading')?.value || 'Inter',
            body_font: document.getElementById('editBody')?.value || 'Inter'
        };

        try {
            await apiFetch(`/shop/edit/${session.slug}`, 'PUT', payload);
            showToast('Shop saved!', 'success');
            await loadShop();
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    };

    // ─── PREVIEW ───────────────────────────────────────────────────────
    function renderPreview() {
        const iframe = document.createElement('iframe');
        iframe.src = `${API}/shop/preview/${session.slug}?email=${encodeURIComponent(session.email)}&password=${encodeURIComponent(session.password)}`;
        iframe.style.width = '100%';
        iframe.style.height = '700px';
        iframe.style.border = '1px solid var(--border)';
        iframe.style.borderRadius = 'var(--radius)';
        document.getElementById('tabPreview').innerHTML = '';
        document.getElementById('tabPreview').appendChild(iframe);
    }

    // ─── ANALYTICS ─────────────────────────────────────────────────────
    function renderAnalytics() {
        const data = session.shopData || {};
        const json = data.shop_json || {};
        const analytics = json.analytics || {};
        const visits = analytics.visit_count || 0;
        const daily = analytics.daily_visits || {};
        const countries = analytics.countries || {};
        const devices = analytics.devices || {};
        const referrers = analytics.referrers || {};
        const clicks = analytics.clicks || {};

        // Last 7 days
        let dailyHtml = '';
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            const count = daily[key] || 0;
            const pct = visits > 0 ? (count / visits) * 100 : 0;
            dailyHtml += `
                <div class="analytics-bar">
                    <span class="label">${d.toLocaleDateString('en', { weekday: 'short' })}</span>
                    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
                    <span class="value">${count}</span>
                </div>
            `;
        }

        // Countries
        let countriesHtml = '';
        Object.entries(countries).sort((a, b) => b[1] - a[1]).slice(0, 10).forEach(([c, count]) => {
            const pct = visits > 0 ? (count / visits) * 100 : 0;
            countriesHtml += `
                <div class="analytics-bar">
                    <span class="label">${c}</span>
                    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
                    <span class="value">${count}</span>
                </div>
            `;
        });

        // Devices
        let devicesHtml = `
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <div class="stat-card" style="flex:1;min-width:100px;"><div class="number">${devices.mobile || 0}</div><div class="label">Mobile</div></div>
                <div class="stat-card" style="flex:1;min-width:100px;"><div class="number">${devices.desktop || 0}</div><div class="label">Desktop</div></div>
                <div class="stat-card" style="flex:1;min-width:100px;"><div class="number">${devices.tablet || 0}</div><div class="label">Tablet</div></div>
            </div>
        `;

        let html = `
            <h2>Analytics</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="number">${visits}</div><div class="label">Total Visits</div></div>
                <div class="stat-card"><div class="number">${Object.keys(countries).length}</div><div class="label">Countries</div></div>
                <div class="stat-card"><div class="number">${Object.keys(referrers).length}</div><div class="label">Referrers</div></div>
            </div>
            <div class="card">
                <h3>Last 7 Days</h3>
                ${dailyHtml}
            </div>
            <div class="card">
                <h3>Top Countries</h3>
                ${countriesHtml || '<p class="text-muted">No data yet</p>'}
            </div>
            <div class="card">
                <h3>Devices</h3>
                ${devicesHtml}
            </div>
            ${Object.keys(referrers).length > 0 ? `
            <div class="card">
                <h3>Top Referrers</h3>
                ${Object.entries(referrers).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([r, count]) => `
                    <div class="analytics-bar">
                        <span class="label">${r}</span>
                        <div class="track"><div class="fill" style="width:${(count/visits)*100}%"></div></div>
                        <span class="value">${count}</span>
                    </div>
                `).join('')}
            </div>
            ` : ''}
        `;
        document.getElementById('tabAnalytics').innerHTML = html;
    }

    // ─── REFERRALS ────────────────────────────────────────────────────
    function renderReferrals() {
        let html = `
            <h2>Referrals</h2>
            <div class="card">
                <p class="text-muted">Loading referral data...</p>
            </div>
        `;
        document.getElementById('tabReferrals').innerHTML = html;

        apiFetch('/shop/referrals').then(data => {
            html = `
                <h2>Referrals</h2>
                <div class="card">
                    <div class="card-row"><span class="label">Your code</span><span class="value"><strong>${data.referral_code || 'N/A'}</strong></span></div>
                    <div class="card-row"><span class="label">People referred</span><span class="value">${data.total_referred || 0}</span></div>
                    <div class="card-row"><span class="label">Commission (₦450 each)</span><span class="value">₦${(data.total_referred || 0) * 450}</span></div>
                </div>
                <div class="card">
                    <p style="color:var(--text3);font-size:0.85rem;"><i class="fa-solid fa-info-circle"></i> Referral payouts coming soon!</p>
                </div>
            `;
            document.getElementById('tabReferrals').innerHTML = html;
        }).catch(() => {
            document.getElementById('tabReferrals').innerHTML = '<div class="card"><p class="text-muted">Error loading referrals</p></div>';
        });
    }

    // ─── SETTINGS ──────────────────────────────────────────────────────
    function renderSettings() {
        let html = `
            <h2>Settings</h2>
            <div class="card">
                <div class="card-row"><span class="label">Email</span><span class="value">${session.email}</span></div>
                <div class="card-row"><span class="label">Plan</span><span class="value"><span class="badge badge-${session.plan}">${session.plan.toUpperCase()}</span></span></div>
            </div>
            <div class="card">
                <h3>Shop Status</h3>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-primary btn-sm" onclick="toggleShop('reactivate')"><i class="fa-solid fa-play"></i> Reactivate</button>
                    <button class="btn btn-secondary btn-sm" onclick="toggleShop('deactivate')"><i class="fa-solid fa-ban"></i> Deactivate</button>
                </div>
            </div>
            <button class="btn btn-secondary" style="width:100%;" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        `;
        document.getElementById('tabSettings').innerHTML = html;
    }

    window.toggleShop = async function(action) {
        if (!confirm('Are you sure?')) return;
        try {
            const endpoint = action === 'reactivate' ? `/shop/${session.slug}/reactivate` : `/shop/${session.slug}/deactivate`;
            await apiFetch(endpoint, 'POST');
            showToast(action === 'reactivate' ? 'Shop reactivated!' : 'Shop deactivated', 'success');
            await loadShop();
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    };

    function toggleSidebar() {
        document.getElementById('appSidebar').classList.toggle('open');
    }

    // ─── INIT ──────────────────────────────────────────────────────────
    window.addEventListener('load', function() {
        try {
            const saved = localStorage.getItem('myshop_session');
            if (saved) {
                const data = JSON.parse(saved);
                session = { ...session, ...data };
                if (session.email && session.password) {
                    showSection('app');
                    return;
                }
            }
        } catch (e) {}
        showSection('login');
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.icon-picker') && !e.target.closest('.icon-btn')) {
            document.getElementById('iconPicker').classList.remove('open');
        }
    });

    // Show install banner on mobile
    if (window.innerWidth <= 768) {
        document.getElementById('sidebarToggle').style.display = 'block';
    }
</script>
</body>
</html>
