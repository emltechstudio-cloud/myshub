<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>MyShub - Your Business Hub</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10828/10828179.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
:root{--primary:#6366f1;--primary-dark:#4f46e5;--secondary:#ec4899;--accent:#f59e0b;--bg:#0f172a;--surface:#1e293b;--surface-light:#334155;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--gold:#fbbf24;--silver:#94a3b8;--bronze:#a16207}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface-light);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes scaleIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.animate-fade-in{animation:fadeIn .4s ease-out}
.animate-slide-up{animation:slideUp .3s ease-out}
.animate-pulse{animation:pulse 2s ease-in-out infinite}
.animate-float{animation:float 3s ease-in-out infinite}
.animate-scale-in{animation:scaleIn .3s ease-out}
.glass{background:rgba(30,41,59,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-light) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,23,42,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.bottom-tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;transition:all .2s;position:relative}
.bottom-tab.active{color:var(--primary)}
.bottom-tab.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--primary);border-radius:0 0 4px 4px}
.bottom-tab:not(.active){color:var(--text-muted)}
.bottom-tab i{font-size:20px;margin-bottom:2px}
.bottom-tab span{font-size:10px;font-weight:500}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
.card-hover{transition:all .2s}
.card-hover:hover{transform:translateY(-2px);border-color:var(--primary)}
.btn{padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-secondary{background:var(--surface-light);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface)}
.btn-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a}
.btn-danger{background:var(--danger);color:white}
.btn-sm{padding:8px 16px;font-size:13px}
.input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:inherit;transition:all .2s}
.input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.input::placeholder{color:var(--text-muted)}
.badge-free{background:rgba(148,163,184,.15);color:var(--silver);border:1px solid rgba(148,163,184,.3)}
.badge-pro{background:rgba(99,102,241,.15);color:var(--primary);border:1px solid rgba(99,102,241,.3)}
.badge-premium{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.15));color:var(--gold);border:1px solid rgba(251,191,36,.3)}
.notif-bell{position:relative;cursor:pointer;padding:8px}
.notif-bell .count{position:absolute;top:2px;right:2px;background:var(--danger);color:white;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:var(--surface);border-radius:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
.toast-container{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;animation:fadeIn .3s ease-out;display:flex;align-items:center;gap:8px}
.toast-success{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.toast-error{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.emoji-item{padding:8px;text-align:center;cursor:pointer;border-radius:8px;font-size:20px;transition:all .15s}
.emoji-item:hover{background:var(--surface-light);transform:scale(1.2)}
.qr-container{background:white;padding:20px;border-radius:16px;display:inline-block}
.qr-container canvas{display:block}
.toggle{position:relative;width:48px;height:26px;background:var(--surface-light);border-radius:13px;cursor:pointer;transition:all .3s}
.toggle.active{background:var(--primary)}
.toggle::after{content:'';position:absolute;width:22px;height:22px;background:white;border-radius:50%;top:2px;left:2px;transition:all .3s}
.toggle.active::after{left:24px}
.platform-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.platform-item{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--bg);border:2px solid transparent;cursor:pointer;transition:all .2s;font-size:22px}
.platform-item:hover{border-color:var(--primary);transform:scale(1.05)}
.platform-item.selected{border-color:var(--primary);background:rgba(99,102,241,.1)}
.platform-item.locked{opacity:.3;cursor:not-allowed}
.chart-bar{background:var(--primary);border-radius:4px;transition:height .5s ease-out;min-height:4px}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.notif-item:hover{background:var(--bg)}
.notif-item.unread{border-left:3px solid var(--primary)}
@media(min-width:768px){.mobile-only{display:none!important}}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .bottom-tabs{padding-bottom:env(safe-area-inset-bottom)}
  .main-content{padding-bottom:calc(80px+env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div id="toastContainer" class="toast-container"></div>
<div id="authScreen" class="fixed inset-0 z-50 bg-[#0f172a] flex flex-col"><div class="flex-1 overflow-y-auto"></div></div>
<div id="mainApp" class="hidden">

      </div>
      <div class="flex items-center gap-3">
        <div class="notif-bell" onclick="openNotifications()"><i class="fas fa-bell text-lg text-[#94a3b8]"></i><span id="notifCount" class="count hidden">0</span></div>
        <div id="headerPlanBadge" class="hidden"></div>
      </div>
    </div>
  </header>
  <main id="mainContent" class="main-content pt-16 pb-20 px-4 min-h-screen"></main>
  <nav class="bottom-tabs flex mobile-only">
    <div class="bottom-tab active" data-tab="home" onclick="switchTab('home')"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="bottom-tab" data-tab="edit" onclick="switchTab('edit')"><i class="fas fa-pen"></i><span>Edit</span></div>
    <div class="bottom-tab" data-tab="preview" onclick="switchTab('preview')"><i class="fas fa-eye"></i><span>Preview</span></div>
    <div class="bottom-tab" data-tab="analytics" onclick="switchTab('analytics')"><i class="fas fa-chart-bar"></i><span>Analytics</span></div>
    <div class="bottom-tab" data-tab="settings" onclick="switchTab('settings')"><i class="fas fa-cog"></i><span>Settings</span></div>
  </nav>
</div>
<div id="notifPanel" class="fixed inset-0 z-[150] hidden">
  <div class="absolute inset-0 bg-black/50" onclick="closeNotifications()"></div>
  <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-[#1e293b] border-l border-[#334155] animate-slide-up">
    <div class="flex items-center justify-between p-4 border-b border-[#334155]"><h3 class="font-bold text-lg">Notifications</h3><button onclick="closeNotifications()" class="p-2 rounded-lg hover:bg-[#334155]"><i class="fas fa-times"></i></button></div>
    <div id="notifList" class="overflow-y-auto" style="height:calc(100vh-60px)"></div>
  </div>
</div>
<div id="emojiModal" class="modal-overlay hidden" onclick="if(event.target===this)closeEmojiPicker()">
  <div class="modal-content">
    <div class="flex items-center justify-between p-4 border-b border-[#334155]"><h3 class="font-bold">Choose Icon</h3><button onclick="closeEmojiPicker()" class="p-2 rounded-lg hover:bg-[#334155]"><i class="fas fa-times"></i></button></div>
    <div class="p-4"><div class="emoji-grid" id="emojiGrid"></div></div>
  </div>
</div>
<div id="qrModal" class="modal-overlay hidden" onclick="if(event.target===this)closeQrModal()">
  <div class="modal-content text-center p-6">
    <h3 class="font-bold text-lg mb-4">Your Shop QR Code</h3>
    <div id="qrDisplay" class="qr-container mx-auto mb-4"></div>
    <p class="text-[#94a3b8] text-sm mb-2">Scan to visit your shop</p>
    <p class="text-xs text-[#94a3b8] mb-4">Powered by <a href="https://codeqr.afric.site" target="_blank" class="text-indigo-400 hover:underline">CodeQR</a></p>
    <button onclick="downloadQR()" class="btn btn-primary w-full"><i class="fas fa-download"></i> Download QR</button>
    <button onclick="closeQrModal()" class="btn btn-secondary w-full mt-2">Close</button>
  </div>
</div>
<div id="upgradeModal" class="modal-overlay hidden" onclick="if(event.target===this)closeUpgradeModal()">
  <div class="modal-content p-6">
    <div class="text-center mb-6">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center mx-auto mb-4"><i class="fas fa-crown text-2xl text-white"></i></div>
      <h3 class="font-bold text-xl mb-2">Upgrade Your Plan</h3>
      <p class="text-[#94a3b8] text-sm">Unlock more features for your business</p>
    </div>
    <div class="space-y-3 mb-6">
      <div class="card cursor-pointer border-2 border-transparent hover:border-indigo-500 transition-all" onclick="selectPlan('pro')">
        <div class="flex items-center justify-between">
          <div><h4 class="font-bold text-indigo-400">Pro</h4><p class="text-[#94a3b8] text-sm">5 custom links, 10 socials</p></div>
          <div class="text-right"><span class="font-bold text-lg">₦1,500</span><span class="text-[#94a3b8] text-xs">/mo</span></div>
        </div>
      </div>
      <div class="card cursor-pointer border-2 border-transparent hover:border-yellow-500 transition-all" onclick="selectPlan('premium')">
        <div class="flex items-center justify-between">
          <div><h4 class="font-bold text-yellow-400">Premium</h4><p class="text-[#94a3b8] text-sm">Unlimited everything</p></div>
          <div class="text-right"><span class="font-bold text-lg">₦3,500</span><span class="text-[#94a3b8] text-xs">/mo</span></div>
        </div>
      </div>
    </div>
    <button onclick="initiatePayment()" class="btn btn-primary w-full">Continue to Payment</button>
    <button onclick="closeUpgradeModal()" class="btn btn-secondary w-full mt-2">Maybe Later</button>
  </div>
</div>

function renderLogin(){const c=document.querySelector('#authScreen > div');c.innerHTML=`<div class="min-h-screen flex flex-col items-center justify-center px-6 animate-fade-in"><div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center mb-6 shadow-2xl shadow-indigo-500/30"><i class="fas fa-store text-3xl text-white"></i></div><h1 class="text-3xl font-bold mb-2" style="font-family:'Space Grotesk',sans-serif">MyShub</h1><p class="text-[#94a3b8] mb-8 text-center">Your business hub. One link, everywhere.</p><form id="loginForm" class="w-full max-w-sm space-y-4" onsubmit="handleLogin(event)"><div><label class="text-sm text-[#94a3b8] mb-1 block">Email</label><input type="email" id="loginEmail" class="input" placeholder="you@example.com" required></div><div><label class="text-sm text-[#94a3b8] mb-1 block">Password</label><input type="password" id="loginPassword" class="input" placeholder="••••••••" required></div><button type="submit" class="btn btn-primary w-full justify-center" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button></form><div class="mt-6 text-center space-y-3"><p class="text-sm text-[#94a3b8]">Don't have an account? <button onclick="renderRegister()" class="text-indigo-400 hover:underline font-medium">Create one</button></p><p class="text-sm text-[#94a3b8]">Forgot password? <button onclick="renderForgot()" class="text-indigo-400 hover:underline font-medium">Recover</button></p></div><div class="mt-8 flex items-center gap-4 text-[#64748b] text-xs"><a href="discover.html" class="hover:text-indigo-400 transition-colors"><i class="fas fa-search mr-1"></i>Discover</a><span>|</span><a href="index.html" class="hover:text-indigo-400 transition-colors"><i class="fas fa-home mr-1"></i>Home</a></div></div>`}
function renderRegister(){const c=document.querySelector('#authScreen > div');c.innerHTML=`<div class="min-h-screen flex flex-col px-6 py-8 animate-fade-in"><div class="flex items-center gap-3 mb-6"><button onclick="renderLogin()" class="p-2 rounded-lg hover:bg-[#1e293b]"><i class="fas fa-arrow-left"></i></button><h2 class="text-xl font-bold">Create Account</h2></div><form id="registerForm" class="w-full max-w-sm space-y-4 mx-auto" onsubmit="handleRegister(event)"><div><label class="text-sm text-[#94a3b8] mb-1 block">Business Name *</label><input type="text" id="regName" class="input" placeholder="Your Business Name" required></div><div><label class="text-sm text-[#94a3b8] mb-1 block">Email *</label><input type="email" id="regEmail" class="input" placeholder="you@example.com" required></div><div><label class="text-sm text-[#94a3b8] mb-1 block">Phone *</label><input type="tel" id="regPhone" class="input" placeholder="+234..." required></div><div><label class="text-sm text-[#94a3b8] mb-1 block">Country *</label><select id="regCountry" class="input" onchange="updateRegStates()" required><option value="">Select Country</option>${COUNTRIES.map(c=>`<option value="${c.code}">${c.name}</option>`).join('')}</select></div><div><label class="text-sm text-[#94a3b8] mb-1 block">State/Province *</label><select id="regState" class="input" required><option value="">Select State</option></select></div><div><label class="text-sm text-[#94a3b8] mb-1 block">Category *</label><select id="regCategory" class="input" required><option value="">Select Category</option>${CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div><label class="text-sm text-[#94a3b8] mb-1 block">Password *</label><input type="password" id="regPassword" class="input" placeholder="Min 8 characters" minlength="8" required></div><div><label class="text-sm text-[#94a3b8] mb-1 block">Confirm Password *</label><input type="password" id="regConfirm" class="input" placeholder="••••••••" required></div><button type="submit" class="btn btn-primary w-full justify-center" id="regBtn"><i class="fas fa-user-plus"></i> Create Account</button></form><p class="text-center mt-6 text-sm text-[#94a3b8]">Already have an account? <button onclick="renderLogin()" class="text-indigo-400 hover:underline font-medium">Sign in</button></p></div>`}
function updateRegStates(){const cc=document.getElementById('regCountry').value;const ss=document.getElementById('regState');const cn=COUNTRIES.find(c=>c.code===cc);if(cn){ss.innerHTML=`<option value="">Select State</option>${cn.states.map(s=>`<option value="${s.name}">${s.name}</option>`).join('')}`}}
function renderForgot(){const c=document.querySelector('#authScreen > div');c.innerHTML=`<div class="min-h-screen flex flex-col px-6 py-8 animate-fade-in"><div class="flex items-center gap-3 mb-6"><button onclick="renderLogin()" class="p-2 rounded-lg hover:bg-[#1e293b]"><i class="fas fa-arrow-left"></i></button><h2 class="text-xl font-bold">Recover Password</h2></div><div class="w-full max-w-sm mx-auto space-y-4"><div><label class="text-sm text-[#94a3b8] mb-1 block">Email</label><input type="email" id="forgotEmail" class="input" placeholder="you@example.com"></div><button onclick="fetchSecurityQuestions()" class="btn btn-primary w-full justify-center"><i class="fas fa-search"></i> Find Account</button><div id="securityQuestions" class="hidden space-y-4"></div></div></div>`}
async function handleLogin(e){e.preventDefault();const b=document.getElementById('loginBtn');b.innerHTML='<i class="fas fa-spinner fa-spin"></i> Signing in...';b.disabled=true;try{const r=await fetch(`${API_BASE}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('loginEmail').value,password:document.getElementById('loginPassword').value})});const d=await r.json();if(r.ok){currentUser=d.user;localStorage.setItem('myshub_token',d.access_token);await loadShopData();showApp();showToast('Welcome back!','success')}else{showToast(d.detail||'Login failed','error')}}catch(err){showToast('Network error. Please try again.','error')}finally{b.innerHTML='<i class="fas fa-sign-in-alt"></i> Sign In';b.disabled=false}}
async function handleRegister(e){e.preventDefault();const p=document.getElementById('regPassword').value;const c=document.getElementById('regConfirm').value;if(p!==c){showToast('Passwords do not match','error');return}const b=document.getElementById('regBtn');b.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating...';b.disabled=true;try{const r=await fetch(`${API_BASE}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('regEmail').value,password:p,business_name:document.getElementById('regName').value,phone:document.getElementById('regPhone').value,country:document.getElementById('regCountry').value,state:document.getElementById('regState').value,category:document.getElementById('regCategory').value})});const d=await r.json();if(r.ok){currentUser=d.user;localStorage.setItem('myshub_token',d.access_token);await loadShopData();showApp();showToast('Welcome to MyShub! Your QR code is ready.','success');setTimeout(()=>showQR(),1000)}else{showToast(d.detail||'Registration failed','error')}}catch(err){showToast('Network error. Please try again.','error')}finally{b.innerHTML='<i class="fas fa-user-plus"></i> Create Account';b.disabled=false}}
async function fetchSecurityQuestions(){const e=document.getElementById('forgotEmail').value;if(!e){showToast('Enter your email','error');return}try{const r=await fetch(`${API_BASE}/auth/security-questions?email=${encodeURIComponent(e)}`);const d=await r.json();if(r.ok){document.getElementById('securityQuestions').classList.remove('hidden');document.getElementById('securityQuestions').innerHTML=`<div class="card"><p class="text-sm text-[#94a3b8] mb-3">Answer your security question:</p><p class="font-medium mb-3">${d.question}</p><input type="text" id="secAnswer" class="input mb-3" placeholder="Your answer"><input type="password" id="newPassword" class="input mb-3" placeholder="New password" minlength="8"><button onclick="resetPassword('${e}')" class="btn btn-primary w-full">Reset Password</button></div>`}else{showToast(d.detail||'Account not found','error')}}catch(err){showToast('Network error','error')}}
async function resetPassword(e){const a=document.getElementById('secAnswer').value;const p=document.getElementById('newPassword').value;try{const r=await fetch(`${API_BASE}/auth/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,answer:a,new_password:p})});const d=await r.json();if(r.ok){showToast('Password reset successful!','success');renderLogin()}else{showToast(d.detail||'Reset failed','error')}}catch(err){showToast('Network error','error')}}
async function loadShopData(){try{const t=localStorage.getItem('myshub_token');const r=await fetch(`${API_BASE}/shop/preview/${currentUser.shop_slug}`,{headers:{'Authorization':`Bearer ${t}`}});if(r.ok){currentShop=await r.json()}}catch(err){console.error('Failed to load shop:',err)}}
function switchTab(t){currentTab=t;document.querySelectorAll('.bottom-tab').forEach(x=>x.classList.remove('active'));document.querySelector(`.bottom-tab[data-tab="${t}"]`)?.classList.add('active');const c=document.getElementById('mainContent');c.innerHTML='<div class="flex items-center justify-center py-20"><i class="fas fa-spinner fa-spin text-3xl text-indigo-500"></i></div>';switch(t){case'home':renderHome();break;case'edit':renderEdit();break;case'preview':renderPreview();break;case'analytics':renderAnalytics();break;case'settings':renderSettings();break}}

function renderPlatformGrid(selected,limit){
const grid=document.getElementById('platformGrid');
if(!grid)return;
grid.innerHTML=PLATFORMS.map((pl,i)=>{
const isSelected=selected.includes(pl.id);
const isLocked=limit!==Infinity&&i>=limit&&!isSelected;
return`<div class="platform-item ${isSelected?'selected':''} ${isLocked?'locked':''}" data-id="${pl.id}" onclick="${isLocked?'':'togglePlatform(this)'}" title="${pl.name}${isLocked?' (Upgrade to unlock)':''}"><i class="${pl.icon}" style="color:${pl.color}"></i></div>`;
}).join('');
}

function togglePlatform(el){
const id=el.dataset.id;
const s=currentShop||{};const socials=s.socials||{};
if(socials[id]){delete socials[id];el.classList.remove('selected');}
else{socials[id]='';el.classList.add('selected');}
currentShop={...s,socials};
renderPlatformGrid(Object.keys(socials),PLAN_LIMITS[s.plan||'free'].socialPlatforms);
}

function renderCustomLinksList(links){
const list=document.getElementById('customLinksList');
if(!list)return;
list.innerHTML=links.map((link,i)=>`<div class="flex items-center gap-2 bg-[#0f172a] rounded-xl p-3">
<button onclick="openEmojiPicker(${i})" class="text-2xl hover:scale-110 transition-transform" title="Change icon">${link.icon||'🔗'}</button>
<input type="text" class="input flex-1 text-sm" value="${link.label||''}" placeholder="Label" onchange="updateCustomLink(${i},'label',this.value)">
<input type="url" class="input flex-1 text-sm" value="${link.url||''}" placeholder="https://..." onchange="updateCustomLink(${i},'url',this.value)">
<button onclick="removeCustomLink(${i})" class="p-2 text-red-400 hover:bg-red-500/10 rounded-lg"><i class="fas fa-trash"></i></button>
</div>`).join('');
}

function addCustomLink(){
const s=currentShop||{};const links=s.custom_links||[];const p=s.plan||'free';const l=PLAN_LIMITS[p];
if(links.length>=(l.customLinks===Infinity?999:l.customLinks)){showToast('Link limit reached','error');return}
currentShop={...s,custom_links:[...links,{icon:'🔗',label:'',url:''}]};
renderCustomLinksList(currentShop.custom_links);
}

function removeCustomLink(i){
const s=currentShop||{};const links=[...s.custom_links||[]];links.splice(i,1);
currentShop={...s,custom_links:links};renderCustomLinksList(links);
}

function updateCustomLink(i,field,value){
const s=currentShop||{};const links=[...s.custom_links||[]];links[i]={...links[i],[field]:value};
currentShop={...s,custom_links:links};
}

function openEmojiPicker(index){
emojiTarget=index;const grid=document.getElementById('emojiGrid');
grid.innerHTML=EMOJIS.map(e=>`<div class="emoji-item" onclick="selectEmoji('${e}')">${e}</div>`).join('');
document.getElementById('emojiModal').classList.remove('hidden');
}

function selectEmoji(emoji){
if(emojiTarget!==null){
const s=currentShop||{};const links=[...s.custom_links||[]];
links[emojiTarget]={...links[emojiTarget],icon:emoji};
currentShop={...s,custom_links:links};renderCustomLinksList(links);
}
closeEmojiPicker();
}

function closeEmojiPicker(){document.getElementById('emojiModal').classList.add('hidden');emojiTarget=null;}

async function handleLogoUpload(e){
const file=e.target.files[0];if(!file)return;
if(file.size>2*1024*1024){showToast('Logo must be under 2MB','error');return}
const reader=new FileReader();
reader.onload=async(ev)=>{
try{const token=localStorage.getItem('myshub_token');
const r=await fetch(`${API_BASE}/shop/upload-logo`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({slug:currentUser.shop_slug,logo:ev.target.result})});
if(r.ok){const d=await r.json();currentShop={...currentShop,logo:d.logo};showToast('Logo uploaded!','success');renderEdit()}else{showToast('Upload failed','error')}}
catch(err){showToast('Upload error','error')}
};
reader.readAsDataURL(file);
}

async function saveShop(){
const btn=document.getElementById('saveBtn');btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving...';btn.disabled=true;
try{
const token=localStorage.getItem('myshub_token');
const s=currentShop||{};
const data={
name:document.getElementById('editName').value,
tagline:document.getElementById('editTagline').value,
about:document.getElementById('editAbout').value,
category:document.getElementById('editCategory').value,
phone:document.getElementById('editPhone').value,
email:document.getElementById('editEmail').value,
address:document.getElementById('editAddress').value,
country:document.getElementById('editCountry').value,
state:document.getElementById('editState').value,
lga:document.getElementById('editLga').value,
catalog_url:document.getElementById('editCatalog').value,
whatsapp_catalog:document.getElementById('editWaCatalog').value,
socials:s.socials||{},
custom_links:s.custom_links||[],
primary_color:document.getElementById('editPrimary').value,
secondary_color:document.getElementById('editSecondary').value,
use_gradient:document.getElementById('gradientToggle').classList.contains('active'),
heading_font:document.getElementById('editHeadingFont').value,
body_font:document.getElementById('editBodyFont').value
};
const r=await fetch(`${API_BASE}/shop/edit/${currentUser.shop_slug}`,{method:'PUT',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(data)});
if(r.ok){currentShop={...currentShop,...data};showToast('Saved successfully!','success');}else{const d=await r.json();showToast(d.detail||'Save failed','error')}
}catch(err){showToast('Network error','error')}
finally{btn.innerHTML='<i class="fas fa-save"></i> Save';btn.disabled=false;}
}

<div class="card"><h3 class="font-bold mb-3">Top Countries</h3><div class="space-y-2">${countries.map(([c,v])=>`<div class="flex items-center justify-between p-2 rounded-lg bg-[#0f172a]"><span>${c}</span><span class="font-medium text-indigo-400">${v}</span></div>`).join('')}</div></div>

<div class="card"><h3 class="font-bold mb-3">Top Referrers</h3><div class="space-y-2">${referrers.map(([r,v])=>`<div class="flex items-center justify-between p-2 rounded-lg bg-[#0f172a]"><span>${r}</span><span class="font-medium text-pink-400">${v}</span></div>`).join('')}</div></div>

<div class="card"><h3 class="font-bold mb-3">Link Clicks</h3><div class="space-y-2">${(s.link_clicks||[]).map(l=>`<div class="flex items-center justify-between p-2 rounded-lg bg-[#0f172a]"><span class="flex items-center gap-2">${l.icon||'🔗'} ${l.label}</span><span class="font-medium text-emerald-400">${l.clicks||0}</span></div>`).join('')||'<p class="text-sm text-[#94a3b8] text-center py-4">No clicks yet</p>'}</div></div>
</div>`;
document.getElementById('mainContent').innerHTML=html;
}

function renderSettings(){
const s=currentShop||{};
let html=`<div class="animate-fade-in space-y-4">
<div class="card"><h3 class="font-bold mb-3">Account</h3><div class="space-y-3">
<div class="flex items-center justify-between p-3 rounded-xl bg-[#0f172a]"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-indigo-500/20 flex items-center justify-center"><i class="fas fa-envelope text-indigo-400"></i></div><div><div class="font-medium text-sm">${currentUser?.email||'Email'}</div><div class="text-xs text-[#94a3b8]">Logged in</div></div></div></div>
<div class="flex items-center justify-between p-3 rounded-xl bg-[#0f172a]"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-pink-500/20 flex items-center justify-center"><i class="fas fa-store text-pink-400"></i></div><div><div class="font-medium text-sm">${s.name||'Your Shop'}</div><div class="text-xs text-[#94a3b8]">${s.slug||''}</div></div></div></div>
</div></div>

<div class="card"><h3 class="font-bold mb-3">Notifications</h3>
<div class="flex items-center justify-between p-3 rounded-xl bg-[#0f172a] mb-2"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center"><i class="fas fa-bell text-emerald-400"></i></div><div><div class="font-medium text-sm">Push Notifications</div><div class="text-xs text-[#94a3b8]">Get updates when closed</div></div></div><div class="toggle" id="pushToggle" onclick="togglePush()"></div></div>
</div>

<div class="card"><h3 class="font-bold mb-3">Security</h3>
<button onclick="changePassword()" class="flex items-center gap-3 p-3 rounded-xl bg-[#0f172a] hover:bg-[#334155] transition-colors w-full text-left"><div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center"><i class="fas fa-key text-amber-400"></i></div><div class="flex-1"><div class="font-medium text-sm">Change Password</div><div class="text-xs text-[#94a3b8]">Update your password</div></div><i class="fas fa-chevron-right text-[#94a3b8]"></i></button>
</div>

<div class="card"><h3 class="font-bold mb-3">Shop Status</h3>
<div class="flex items-center gap-3 p-3 rounded-xl bg-[#0f172a]"><div class="w-10 h-10 rounded-lg bg-green-500/20 flex items-center justify-center"><i class="fas fa-check-circle text-green-400"></i></div><div class="flex-1"><div class="font-medium text-sm">${s.is_active!==false?'Active':'Deactivated'}</div><div class="text-xs text-[#94a3b8]">Your shop is ${s.is_active!==false?'live':'hidden'}</div></div><button onclick="toggleShopStatus()" class="btn btn-sm ${s.is_active!==false?'btn-danger':'btn-primary'}">${s.is_active!==false?'Deactivate':'Activate'}</button></div>
</div>

${currentUser?.is_admin?`<div class="card"><h3 class="font-bold mb-3">Admin</h3><a href="admin.html" class="flex items-center gap-3 p-3 rounded-xl bg-[#0f172a] hover:bg-[#334155] transition-colors w-full text-left"><div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center"><i class="fas fa-shield-alt text-purple-400"></i></div><div class="flex-1"><div class="font-medium text-sm">Admin Dashboard</div><div class="text-xs text-[#94a3b8]">Manage platform</div></div><i class="fas fa-chevron-right text-[#94a3b8]"></i></a></div>`:''}

<div class="card"><button onclick="logout()" class="flex items-center gap-3 p-3 rounded-xl bg-red-500/10 hover:bg-red-500/20 transition-colors w-full text-left text-red-400"><i class="fas fa-sign-out-alt text-lg"></i><span class="font-medium">Log Out</span></button></div>
</div>`;
document.getElementById('mainContent').innerHTML=html;
}

function togglePush(){
const t=document.getElementById('pushToggle');
if(!t.classList.contains('active')){
if('Notification' in window){Notification.requestPermission().then(p=>{if(p==='granted'){t.classList.add('active');subscribePush();showToast('Push notifications enabled','success')}else{showToast('Permission denied','error')}})}else{showToast('Notifications not supported','error')}
}else{t.classList.remove('active');unsubscribePush();}
}

async function subscribePush(){try{const sw=await navigator.serviceWorker.ready;const sub=await sw.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array('BEl62iSMgVhvN2Q2X6yE2Z9Q8X7yE2Z9Q8X7yE2Z9Q8X7yE2Z9Q8X7yE2Z9Q8X7yE2Z9Q8X7yE2Z9Q8X7yE2Z9Q8')});const token=localStorage.getItem('myshub_token');await fetch(`${API_BASE}/notifications/subscribe`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({subscription:JSON.stringify(sub)})});}catch(e){console.error('Push error:',e)}}
async function unsubscribePush(){try{const sw=await navigator.serviceWorker.ready;const sub=await sw.pushManager.getSubscription();if(sub)await sub.unsubscribe();}catch(e){console.error('Unsubscribe error:',e)}}
function urlBase64ToUint8Array(base64String){const padding='='.repeat((4-base64String.length%4)%4);const base64=(base64String+padding).replace(/\-/g,'+').replace(/_/g,'/');const rawData=window.atob(base64);return Uint8Array.from([...rawData].map(char=>char.charCodeAt(0)));}

function changePassword(){
const np=prompt('Enter new password (min 8 chars):');if(!np||np.length<8){showToast('Password too short','error');return}
showToast('Password change coming soon','success');
}

async function toggleShopStatus(){
const s=currentShop||{};const newStatus=s.is_active===false;
try{const token=localStorage.getItem('myshub_token');
const r=await fetch(`${API_BASE}/shop/edit/${currentUser.shop_slug}`,{method:'PUT',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({is_active:newStatus})});
if(r.ok){currentShop={...s,is_active:newStatus};showToast(newStatus?'Shop activated':'Shop deactivated','success');renderSettings()}else{showToast('Failed to update status','error')}
}catch(err){showToast('Network error','error')}
}

function logout(){localStorage.removeItem('myshub_token');currentUser=null;currentShop=null;showAuth();showToast('Logged out','success');}

// Notifications
async function loadNotifications(){try{const token=localStorage.getItem('myshub_token');if(!token)return;const r=await fetch(`${API_BASE}/notifications/`,{headers:{'Authorization':`Bearer ${token}`}});if(r.ok){notifications=await r.json();updateNotifBadge();}}catch(e){console.error('Notif load error:',e)}}
function updateNotifBadge(){const unread=notifications.filter(n=>!n.read).length;const badge=document.getElementById('notifCount');if(unread>0){badge.textContent=unread>99?'99+':unread;badge.classList.remove('hidden')}else{badge.classList.add('hidden')}}
function openNotifications(){document.getElementById('notifPanel').classList.remove('hidden');renderNotifList();}
function closeNotifications(){document.getElementById('notifPanel').classList.add('hidden');}
function renderNotifList(){const list=document.getElementById('notifList');if(!notifications.length){list.innerHTML='<div class="text-center py-12 text-[#94a3b8]"><i class="fas fa-bell-slash text-3xl mb-3"></i><p>No notifications yet</p></div>';return}
list.innerHTML=notifications.map(n=>`<div class="notif-item ${!n.read?'unread':''}" onclick="markRead('${n.id}')"><div class="flex items-start gap-3"><div class="w-8 h-8 rounded-lg ${n.type==='milestone'?'bg-yellow-500/20':n.type==='expiry'?'bg-red-500/20':'bg-indigo-500/20'} flex items-center justify-center flex-shrink-0"><i class="fas ${n.type==='milestone'?'fa-trophy':n.type==='expiry'?'fa-clock':'fa-bullhorn'} ${n.type==='milestone'?'text-yellow-400':n.type==='expiry'?'text-red-400':'text-indigo-400'} text-xs"></i></div><div class="flex-1"><p class="text-sm font-medium">${n.title}</p><p class="text-xs text-[#94a3b8]">${n.body}</p><p class="text-xs text-[#64748b] mt-1">${n.time||'Just now'}</p></div>${!n.read?'<div class="w-2 h-2 rounded-full bg-indigo-500 mt-1"></div>':''}</div></div>`).join('');}
async function markRead(id){const n=notifications.find(x=>x.id===id);if(n)n.read=true;updateNotifBadge();renderNotifList();}

// QR Code
function showQR(){const s=currentShop||{};const slug=s.slug||currentUser?.shop_slug||'';if(!slug){showToast('Save your shop first','error');return}const url=`${APP_URL}/${slug}`;const display=document.getElementById('qrDisplay');display.innerHTML='';new QRCode(display,{text:url,width:200,height:200,colorDark:'#0f172a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});document.getElementById('qrModal').classList.remove('hidden');}
function closeQrModal(){document.getElementById('qrModal').classList.add('hidden');}
function downloadQR(){const canvas=document.querySelector('#qrDisplay canvas');if(canvas){const link=document.createElement('a');link.download=`myshub-${currentShop?.slug||'qr'}.png`;link.href=canvas.toDataURL();link.click();}}

// Upgrade
function openUpgradeModal(){document.getElementById('upgradeModal').classList.remove('hidden');}
function closeUpgradeModal(){document.getElementById('upgradeModal').classList.add('hidden');selectedPlan=null;}
function selectPlan(plan){selectedPlan=plan;document.querySelectorAll('#upgradeModal .card').forEach(c=>c.style.borderColor='transparent');event.currentTarget.style.borderColor=plan==='premium'?'#fbbf24':'#6366f1';}
function initiatePayment(){if(!selectedPlan){showToast('Select a plan first','error');return}showToast(`Redirecting to Paystack for ${selectedPlan}...`,'success');closeUpgradeModal();}

// Utils
function copyLink(url){navigator.clipboard.writeText(url).then(()=>showToast('Link copied!','success')).catch(()=>showToast('Copy failed','error'));}
function updateHeaderBadge(){const s=currentShop||{};const p=s.plan||'free';const badge=document.getElementById('headerPlanBadge');badge.className=`text-xs px-2 py-0.5 rounded-full ${p==='premium'?'badge-premium':p==='pro'?'badge-pro':'badge-free'}`;badge.textContent=p==='premium'?'Premium':p==='pro'?'Pro':'Free';badge.classList.remove('hidden');}
function showToast(msg,type='success'){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className=`toast toast-${type}`;t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i>${msg}`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(-10px)';setTimeout(()=>t.remove(),300)},3000);}

// Init
document.addEventListener('DOMContentLoaded',()=>{
const token=localStorage.getItem('myshub_token');
if(token){fetch(`${API_BASE}/auth/me`,{headers:{'Authorization':`Bearer ${token}`}}).then(r=>r.ok?r.json():Promise.reject()).then(d=>{currentUser=d;loadShopData().then(()=>showApp());}).catch(()=>{localStorage.removeItem('myshub_token');showAuth();});
}else{showAuth();}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>console.error('SW error:',e));}
});
</script>
</body>
</html>
