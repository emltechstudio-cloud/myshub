<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1877f2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="MY.SHUB - Create and manage your shop">
<title>MY.SHUB</title>
<link rel="stylesheet" href="app.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div id="app">
  <header class="app-header" id="appHeader">
    <div class="header-brand">
      <div class="brand-icon">M</div>
      <span>MY.SHUB</span>
    </div>
    <button class="header-menu-btn" id="menuBtn" onclick="app.toggleMenu()">
      <div class="menu-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <span class="notif-badge" id="notifBadge"></span>
    </button>
  </header>

  <main class="app-content" id="appContent"></main>

  <nav class="app-nav" id="appNav">
    <a href="index.html" class="nav-item" id="navHome">
      <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span>
      <span>Home</span>
    </a>
    <a href="discover.html" class="nav-item" id="navDiscover">
      <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>
      <span>Discover</span>
    </a>
    <a href="dashboard.html" class="nav-item" id="navProfile">
      <span class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
      <span>Profile</span>
    </a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>
</div>

<script>
const API_BASE = 'https://emltechstudio-myshub-api.hf.space';

const app = {
  currentScreen: null,
  user: null,

  init() {
    this.checkAuth();
    this.setActiveNav();
    const hash = window.location.hash.slice(1) || 'discover';
    this.loadScreen(hash);
  },

  checkAuth() {
    const userData = localStorage.getItem('myshub_user');
    if (userData) {
      this.user = JSON.parse(userData);
    }
  },

  isLoggedIn() {
    return this.user !== null;
  },

  setActiveNav() {
    const path = window.location.pathname.split('/').pop();
    document.querySelectorAll('.nav-item').forEach(function(item) { item.classList.remove('active'); });
    if (path.includes('index') || path === '' || path === 'app.html') {
      var el = document.getElementById('navHome');
      if (el) el.classList.add('active');
    } else if (path.includes('discover')) {
      var el = document.getElementById('navDiscover');
      if (el) el.classList.add('active');
    } else if (path.includes('dashboard') || path.includes('profile')) {
      var el = document.getElementById('navProfile');
      if (el) el.classList.add('active');
    }
  },

  async loadScreen(screenName, options) {
    const content = document.getElementById('appContent');
    content.innerHTML = '<div class="screen" style="padding:40px"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>';
    try {
      const response = await fetch(screenName + '.html');
      if (!response.ok) throw new Error('Screen not found');
      const html = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const screenContent = doc.querySelector('.screen') || doc.body;
      const current = content.querySelector('.screen');
      if (current) {
        current.style.animation = 'screenOut 0.2s ease forwards';
        await new Promise(function(r) { setTimeout(r, 200); });
      }
      content.innerHTML = '';
      content.appendChild(screenContent.cloneNode(true));
      const scripts = screenContent.querySelectorAll('script');
      scripts.forEach(function(script) {
        const newScript = document.createElement('script');
        newScript.textContent = script.textContent;
        document.body.appendChild(newScript);
        newScript.remove();
      });
      this.currentScreen = screenName;
      window.history.replaceState(null, null, '#' + screenName);
    } catch (err) {
      content.innerHTML = '<div class="screen empty-state"><div class="empty-state-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg></div><div class="empty-state-title">Screen not found</div><div class="empty-state-desc">Could not load ' + screenName + '</div></div>';
    }
  },

  toggleMenu() {
    this.showToast('Menu coming soon', 'info');
  },

  showToast(message, type) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 3000);
  },

  async api(endpoint, options) {
    const url = API_BASE + endpoint;
    const defaults = { headers: { 'Content-Type': 'application/json' } };
    if (this.user) {
      defaults.headers['Email'] = this.user.email;
      defaults.headers['Password'] = this.user.password;
    }
    const merged = Object.assign({}, defaults, options || {});
    const response = await fetch(url, merged);
    const data = await response.json().catch(function() { return null; });
    return { ok: response.ok, status: response.status, data: data };
  },

  setUser(userData) {
    this.user = userData;
    localStorage.setItem('myshub_user', JSON.stringify(userData));
  },

  logout() {
    this.user = null;
    localStorage.removeItem('myshub_user');
    window.location.href = 'login.html';
  }
};

document.addEventListener('DOMContentLoaded', function() { app.init(); });

document.querySelectorAll('.nav-item').forEach(function(item) {
  item.addEventListener('click', function(e) {
    e.preventDefault();
    const href = item.getAttribute('href');
    const screen = href.replace('.html', '');
    app.loadScreen(screen);
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    item.classList.add('active');
  });
});
</script>
</body>
</html>
