<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notifications - MY.SHUB</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="screen" id="notificationsScreen">
  <div class="section" style="padding-top:8px;">
    <div class="section-title">Notifications</div>

    <div id="notificationsList">
      <!-- Demo notifications -->
      <div class="list-item" style="border-radius:12px;margin-bottom:8px;align-items:flex-start;">
        <div class="list-item-icon" style="background:#e7f3ff;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </div>
        <div class="list-item-content">
          <div class="list-item-title">Welcome to MY.SHUB</div>
          <div class="list-item-desc">Your shop is ready. Start customizing it now.</div>
          <div style="font-size:11px;color:#8a8d91;margin-top:4px;">Just now</div>
        </div>
      </div>

      <div class="list-item" style="border-radius:12px;margin-bottom:8px;align-items:flex-start;">
        <div class="list-item-icon" style="background:#e7f3ff;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        </div>
        <div class="list-item-content">
          <div class="list-item-title">New Visit</div>
          <div class="list-item-desc">Someone just visited your shop.</div>
          <div style="font-size:11px;color:#8a8d91;margin-top:4px;">2 hours ago</div>
        </div>
      </div>

      <div class="list-item" style="border-radius:12px;margin-bottom:8px;align-items:flex-start;">
        <div class="list-item-icon" style="background:#e7f3ff;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1877f2" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </div>
        <div class="list-item-content">
          <div class="list-item-title">New Referral</div>
          <div class="list-item-desc">A new user signed up using your referral.</div>
          <div style="font-size:11px;color:#8a8d91;margin-top:4px;">1 day ago</div>
        </div>
      </div>
    </div>

    <div class="empty-state hidden" id="emptyNotifications">
      <div class="empty-state-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8a8d91" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      </div>
      <div class="empty-state-title">No notifications</div>
      <div class="empty-state-desc">You are all caught up</div>
    </div>
  </div>
</div>
</body>
</html>
